syntax = "proto3";

package fastfood_v2;

import "google/type/money.proto";
message OrderRequest {
  string combo_id = 1;
  uint32 quantity = 2;
}

message OrderResponse {
  string items = 1;
  google.type.Money total_price = 2;
  uint32 ordered_quantity = 3;
}

message StreamOrderRequest {
  string combo_id = 1;
  uint32 quantity = 2;
  uint32 start_time = 3;
}

message StreamOrderResponse {
  oneof response_type {
    OrderResponse success_response = 1;
    string error_message = 2;
  }
  int64 startTime = 4;
  int64 endTime = 5;
}

message MenuReq {}
message MenuRes {
  repeated string items = 1;
}

// combo
message ComboListReq{
  
}
message FoodItem { 
  string id = 1;
  string name=2;
  google.type.Money price =3;
  string note = 4;
}

message ComboItem{
  string id = 1;
  string name = 2;
  string description = 3;
  repeated FoodItem foodItems = 4;
  google.type.Money comboPrice = 5;
}

message ComboListRes{
  repeated ComboItem comboItems = 1;

}

service FastFoodService {
  rpc OrderMeal(OrderRequest) returns (OrderResponse);
  rpc Menus(MenuReq) returns (MenuRes);
  rpc StreamOrder(stream StreamOrderRequest) returns (stream StreamOrderResponse);
  rpc ComboList(ComboListReq) returns (stream ComboListRes);
}
