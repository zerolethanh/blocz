name: blocz_example
description: An example of using blocz CLI tool.
version: 1.4.0
publish_to: none

environment:
  sdk: ^3.10.4

dependencies:
  bloc: ^9.2.0
  freezed_annotation: ^2.4.4
  injectable: ^2.7.1+4
  get_it: ^9.2.1
  flutter_bloc: ^9.1.1
  protobuf: ^6.0.0
  fixnum: ^1.1.1
  connectrpc:
    git:
      url: https://github.com/jakegibson/connect-dart
      # ref: main
      path: packages/connect

dev_dependencies:
  build_runner: ^2.5.4
  freezed: ^2.5.8
  injectable_generator: ^2.7.0
