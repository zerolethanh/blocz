# https://taskfile.dev

version: '3'

#vars:
#  PUB_BIN:
#    linux: $HOME/.pub-cache/bin
#    darwin: $HOME/.pub-cache/bin
#    windows: '%LOCALAPPDATA%\Pub\Cache\bin'

tasks:

  compile:
    desc: Compile binary
    aliases:
      - c
    cmds:
      - dart compile exe bin/floc_helper.dart -o bin/floc_helper
      - ls -lh bin/floc_helper #check file size

  compile:hasher:
    aliases:
      - ch
    cmds:
      - dcli compile -o last_build_hash_gen.dart
      - ls -lh last_build_hash_gen #check file size

  test:built:
    aliases:
      - tb
    cmds:
      - bin/floc_helper {{.CLI_ARGS}}

  test:
    desc: Run tests
    aliases:
      - t
    cmds:
      - dart run bin/floc_helper.dart {{.CLI_ARGS}}

  release:local:
    desc: Release local (activates globally and adds to PATH if missing)
    aliases:
      - rl
    cmds:
      - dart pub global activate --source path .
      - task: setup:path
      - echo " ✅ Successfully activated floc_helper locally."

  setup:path:
    desc: Automatically add pub cache bin to PATH based on OS
    cmds:
      - task: _setup:path:{{OS}}

  _setup:path:darwin:
    internal: true
    cmds:
      - |
        if [[ ":$PATH:" != *":$HOME/.pub-cache/bin:"* ]]; then
          echo "Adding $HOME/.pub-cache/bin to PATH in ~/.zshrc"
          echo 'export PATH="$PATH:$HOME/.pub-cache/bin"' >> ~/.zshrc
          echo "Added to ~/.zshrc. Please run 'source ~/.zshrc' or restart terminal."
        else
          echo "PATH already contains pub-cache/bin"
        fi

  _setup:path:linux:
    internal: true
    cmds:
      - |
        if [[ ":$PATH:" != *":$HOME/.pub-cache/bin:"* ]]; then
          echo "Adding $HOME/.pub-cache/bin to PATH in ~/.bashrc"
          echo 'export PATH="$PATH:$HOME/.pub-cache/bin"' >> ~/.bashrc
          echo "Added to ~/.bashrc. Please run 'source ~/.bashrc' or restart terminal."
        else
          echo "PATH already contains pub-cache/bin"
        fi

  _setup:path:windows:
    internal: true
    cmds:
      - powershell -Command "if (\$env:PATH -notlike '*Pub\Cache\bin*') { \$oldPath = [Environment]::GetEnvironmentVariable('Path', 'User'); [Environment]::SetEnvironmentVariable('Path', \$oldPath + ';\$env:LOCALAPPDATA\Pub\Cache\bin', 'User'); echo 'Added to PATH. Please restart your terminal.' } else { echo 'PATH already contains Pub\Cache\bin' }"
